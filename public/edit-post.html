<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Post — The Inkwell</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <nav>
        <a href="/index.html" class="nav-logo">The <span>Inkwell</span></a>
        <div class="nav-auth" id="navAuth"></div>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="post-form-wrap">
        <h1>Edit post</h1>
        <div id="msgBox"></div>
        <form id="editPostForm">
          <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" required>
          </div>
          <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" required></textarea>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a id="cancelLink" href="/index.html" class="btn btn-ghost">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </main>

  <footer>
    <div class="container"><p>&copy; 2024 The Inkwell</p></div>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/edit-post.js"></script>
</body>
</html>
