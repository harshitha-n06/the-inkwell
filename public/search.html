<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — The Inkwell</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <nav>
        <a href="/index.html" class="nav-logo">The <span>Inkwell</span></a>
        <div class="nav-search">
          <form action="/search.html" id="searchBarForm">
            <input type="text" name="q" id="searchInput" placeholder="Search posts...">
            <button type="submit" class="btn btn-outline btn-sm">Search</button>
          </form>
        </div>
        <div class="nav-auth" id="navAuth"></div>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="search-header">
        <h1 id="searchTitle">Search</h1>
        <p id="searchCount" class="search-count"></p>
      </div>
      <div id="resultList" class="post-list">
        <div class="loading">Searching…</div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container"><p>&copy; 2024 The Inkwell</p></div>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/search.js"></script>
</body>
</html>
